version: '3.8'

services:
  db:
    image: postgres:15
    container_name: flowai_postgres
    environment:
      POSTGRES_DB: FlowAISystem
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Admine222
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  webapp:
    image: flowaisystem:latest
    container_name: flowai_webapp
    ports:
      - "8080:8080"
    environment:
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=FlowAISystem;Username=postgres;Password=Admine222
      - Jwt__Key=YourSuperSecretKeyMustBeAtLeast32Characters!
      - Jwt__Issuer=FlowAISystem
      - Jwt__Audience=FlowAISystemUsers
    depends_on:
      - db
    restart: unless-stopped

volumes:
  postgres_data:
